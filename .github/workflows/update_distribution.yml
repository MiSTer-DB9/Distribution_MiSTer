name: Update Distribution

on:
  schedule:
  - cron:  "*/20 * * * *"
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_FILES_URL: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/%s/
      DB_JSON_NAME: dbencc.json
      DB_ID: distribution_mister
      DB_URL: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/main/dbencc.json.zip
      # [MiSTer-DB9 BEGIN] - TEMPORARY, revert right after the first green run.
      # The currently published dbencc.json has a tag_dictionary missing every id
      # that is only referenced from an archive summary, so db_operator's
      # needs_save() dies with `KeyError: 428` while diffing against it and the
      # job can never publish the repaired db. Pointing the diff at a URL that
      # 404s makes needs_save() take its ReturnCodeException path (returns True,
      # publishes unconditionally); DB_URL itself stays correct so the value
      # baked into the published db is unchanged.
      TEST_DB_URL: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/main/dbencc-force-republish.json.zip
      # [MiSTer-DB9 END]
      ZIPS_CONFIG: /tmp/zips_config.json
      LINUX_GITHUB_REPOSITORY: MiSTer-devel/SD-Installer-Win64_MiSTer
      BROKEN_MRAS_IGNORE: true
      # [MiSTer-DB9 BEGIN] - ship Dual SDRAM RBFs (PSX_DS, Saturn_DS) in main dbencc
      # upstream db_operator.py defaults to omitting *_dualsdram_*/*_ds_* RBFs
      # because MiSTer-devel publishes them in a separate side DB; this fork
      # serves them through the same dbencc.json.
      OMIT_DUAL_SDRAM_CORES: 'false'
      # [MiSTer-DB9 END]

    steps:
    # [MiSTer-DB9 BEGIN] - free big unused toolchains for headroom + log disk.
    # The runner now ships a single ~145 GB root fs (/mnt is no longer a separate
    # scratch disk — df shows /mnt and / as the same /dev/root), with ~105 GB free,
    # so the old bind-mount-to-/mnt relocation gained nothing and was dropped. The
    # toolchain free + df stay as cheap margin/early-warning at the Push peak.
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
        df -h / || true
    # [MiSTer-DB9 END]

    - name: Install apt-get utilities
      run: sudo apt-get install sharutils

    # [MiSTer-DB9 BEGIN] - pin action to SHA (org policy: SHA-only actions)
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
    # [MiSTer-DB9 END]
      with:
        python-version: '3.11'

    # [MiSTer-DB9 BEGIN] - pin action to SHA (org policy: SHA-only actions)
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    # [MiSTer-DB9 END]
      with:
        ref: develop

    - name: Set Git User
      run: |
        git config --global user.email "theypsilon@gmail.com"
        git config --global user.name "The CI/CD Bot"

    - name: Grab Dependencies
      run: |
        curl -o /tmp/zips_config.json "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/zips_config.json"
        curl -o /tmp/db_operator.py "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/db_operator.py"
        curl -o /tmp/test_database.sh "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/test_database.sh"
        curl -o /tmp/push_database.sh "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/push_database.sh"
        # [MiSTer-DB9 BEGIN] - the all_releases/releases.txt audit log is upstream
        # bookkeeping not consumed by the Downloader; a transient gh 401 on it
        # must not red-fail the workflow after the DB git-push already published.
        # git push lines stay fatal so real publish failures still fail the job.
        sed -i 's#^gh release upload all_releases releases\.txt --clobber$#& || true#' /tmp/push_database.sh
        # [MiSTer-DB9 END]
        # [MiSTer-DB9 BEGIN] - log disk usage right after the Push peak (the
        # git fetch --unshallow re-pulls prior main+zips objects) for early
        # warning before the next ceiling approach turns into a hard ENOSPC.
        sed -i 's#^git fetch --unshallow origin || true$#&\ndf -h .#' /tmp/push_database.sh
        # [MiSTer-DB9 END]
        chmod +x /tmp/db_operator.py /tmp/test_database.sh /tmp/push_database.sh

    - name: Download Distribution
      run: ./.github/download_encc_distribution.py .

    - name: Validate Distribution
      run: |
        FILES=$(find . -type f | wc -l)
        echo "FILES: ${FILES}"
        if (( ${FILES} < 13000 )) ; then
          echo "Not enough files!"
          exit 1
        fi

    - name: Commit Distribution
      run: |
        git checkout -f develop -b main
        git add .
        git commit -m "-"

    - name: Build Database
      run: /tmp/db_operator.py build .

    - name: New Database Exists?
      id: db_exists
      run: if [ -f "${DB_JSON_NAME}" ] ; then echo "new_db=true" >> "${GITHUB_OUTPUT}" ; fi

    # [MiSTer-DB9 BEGIN] - rewrite tags on _Unstable/*.rbf entries so they
    # carry only [unstable, unstable-<slug>]. Must run AFTER Build Database
    # and BEFORE Test Database / Push Database.
    - name: Inject Unstable Tags
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_unstable_tags.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - per-fork DISTRIBUTION_FILTERS tag rewrite: entries
    # belonging to SYNCING_FORKS sections that declare the field have their
    # tags replaced with exactly the listed tokens (e.g. PSX_DS / Saturn_DS
    # opt-in via `dualsdram`). Must run AFTER Build Database and AFTER Inject
    # Unstable Tags (whose _Unstable/ invariant must already be satisfied).
    - name: Inject Distribution Filters
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_distribution_filters.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - rewrite db_operator's polluted per-RBF "core" tag
    # for fork stable assets. db_operator's split_on_date only strips a 9-char
    # _YYYYMMDD tail, so fork names ending in _<sha7>_DB9 bake those segments
    # into a per-game tag (`arcadearkanoid202605029246dfedb9`). Replace with
    # the canonical `slugify(release_core_name)` form already used by
    # inject_unstable_tags.py. Must run AFTER Build Database, AFTER Inject
    # Unstable Tags (whose _Unstable/ invariant we mustn't perturb), AFTER
    # Inject Distribution Filters (whose explicit-token entries we mustn't
    # overwrite).
    - name: Inject Stable Clean Slugs
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_stable_clean_slugs.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - reassert jotego's authoritative jtbindb tags onto
    # the jt entries. download_encc_distribution.fetch_jotego_bundles() drove
    # the jt set from jotego's jtbindb (overlaying our DB9 rebuild); db_operator
    # then re-derived path tags for those files. This restores jotego's exact
    # tag taxonomy (`jtbeta`, controls_*, ...) from /tmp/jtbindb_slice.json so
    # the jt channel keeps jotego's filters and stays out of default
    # `filter = console`. Must run AFTER Build Database; order vs the other
    # hooks is independent (it keys on exact jt rel_paths none of them touch).
    - name: Inject jtbindb Tags
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_jtbindb_tags.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - set the DB-level default_options.filter so the
    # no-filter cohort gets a sane default (stable set minus nightly unstable
    # builds, jotego beta-key MRAs, Dual-SDRAM variants). Users who set their
    # own filter are unaffected; each token stays opt-in. Mirrors jotego's
    # own `!jtbeta` default. DB-level (not per-entry) so order vs the tag
    # hooks is independent; must run AFTER Build Database.
    - name: Inject Default Options
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_default_options.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    - name: Test Database
      if: steps.db_exists.outputs.new_db == 'true'
      run: /tmp/test_database.sh

    - name: Push Database
      if: steps.db_exists.outputs.new_db == 'true' 
      run: /tmp/push_database.sh
