name: Update Distribution

on:
  schedule:
  - cron:  "*/20 * * * *"
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_FILES_URL: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/%s/
      DB_JSON_NAME: dbencc.json
      DB_ID: distribution_mister
      DB_URL: https://raw.githubusercontent.com/MiSTer-DB9/Distribution_MiSTer/main/dbencc.json.zip
      ZIPS_CONFIG: /tmp/zips_config.json
      LINUX_GITHUB_REPOSITORY: MiSTer-devel/SD-Installer-Win64_MiSTer
      BROKEN_MRAS_IGNORE: true
      # [MiSTer-DB9 BEGIN] - ship Dual SDRAM RBFs (PSX_DS, Saturn_DS) in main dbencc
      # upstream db_operator.py defaults to omitting *_dualsdram_*/*_ds_* RBFs
      # because MiSTer-devel publishes them in a separate side DB; this fork
      # serves them through the same dbencc.json.
      OMIT_DUAL_SDRAM_CORES: 'false'
      # [MiSTer-DB9 END]

    steps:
    - name: Install apt-get utilities
      run: sudo apt-get install sharutils

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - uses: actions/checkout@v6
      with:
        ref: develop

    - name: Set Git User
      run: |
        git config --global user.email "theypsilon@gmail.com"
        git config --global user.name "The CI/CD Bot"

    - name: Grab Dependencies
      run: |
        curl -o /tmp/zips_config.json "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/zips_config.json"
        curl -o /tmp/db_operator.py "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/db_operator.py"
        curl -o /tmp/test_database.sh "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/test_database.sh"
        curl -o /tmp/push_database.sh "https://raw.githubusercontent.com/MiSTer-devel/Distribution_MiSTer/develop/.github/push_database.sh"
        chmod +x /tmp/db_operator.py /tmp/test_database.sh /tmp/push_database.sh

    - name: Download Distribution
      run: ./.github/download_encc_distribution.py .

    - name: Validate Distribution
      run: |
        FILES=$(find . -type f | wc -l)
        echo "FILES: ${FILES}"
        if (( ${FILES} < 13000 )) ; then
          echo "Not enough files!"
          exit 1
        fi

    - name: Commit Distribution
      run: |
        git checkout -f develop -b main
        git add .
        git commit -m "-"

    - name: Build Database
      run: /tmp/db_operator.py build .

    - name: New Database Exists?
      id: db_exists
      run: if [ -f "${DB_JSON_NAME}" ] ; then echo "new_db=true" >> "${GITHUB_OUTPUT}" ; fi

    # [MiSTer-DB9 BEGIN] - rewrite tags on _Unstable/*.rbf entries so they
    # carry only [unstable, unstable-<slug>]. Must run AFTER Build Database
    # and BEFORE Test Database / Push Database.
    - name: Inject Unstable Tags
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_unstable_tags.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - per-fork DISTRIBUTION_FILTERS tag rewrite: entries
    # belonging to SYNCING_FORKS sections that declare the field have their
    # tags replaced with exactly the listed tokens (e.g. PSX_DS / Saturn_DS
    # opt-in via `dualsdram`). Must run AFTER Build Database and AFTER Inject
    # Unstable Tags (whose _Unstable/ invariant must already be satisfied).
    - name: Inject Distribution Filters
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_distribution_filters.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    # [MiSTer-DB9 BEGIN] - rewrite db_operator's polluted per-RBF "core" tag
    # for fork stable assets. db_operator's split_on_date only strips a 9-char
    # _YYYYMMDD tail, so fork names ending in _<sha7>_DB9 bake those segments
    # into a per-game tag (`arcadearkanoid202605029246dfedb9`). Replace with
    # the canonical `slugify(release_core_name)` form already used by
    # inject_unstable_tags.py. Must run AFTER Build Database, AFTER Inject
    # Unstable Tags (whose _Unstable/ invariant we mustn't perturb), AFTER
    # Inject Distribution Filters (whose explicit-token entries we mustn't
    # overwrite).
    - name: Inject Stable Clean Slugs
      if: steps.db_exists.outputs.new_db == 'true'
      run: ./.github/inject_stable_clean_slugs.py "${DB_JSON_NAME}"
    # [MiSTer-DB9 END]

    - name: Test Database
      if: steps.db_exists.outputs.new_db == 'true'
      run: /tmp/test_database.sh

    - name: Push Database
      if: steps.db_exists.outputs.new_db == 'true' 
      run: /tmp/push_database.sh
